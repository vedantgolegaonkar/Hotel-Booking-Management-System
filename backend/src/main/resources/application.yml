server:
  port: 8080

spring:
  application:
    name: resort-management-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForJwtTokenGenerationWhichIsLongEnoughForHS256AlgorithmToWorkProperly12345!}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000
