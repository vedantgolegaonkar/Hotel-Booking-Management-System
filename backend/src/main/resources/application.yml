server:
  port: 8080

spring:
  application:
    name: resort-management-backend
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  flyway:
    enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForJwtTokenGenerationWhichIsLongEnoughForHS256AlgorithmToWorkProperly12345!}
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000
